<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="300" height="60" role="img" aria-label="Shree Gallary — fine &amp; imitation jewellery, clothing">
  <!-- Emblem -->
  <circle cx="30" cy="30" r="25" fill="none" stroke="#111111" stroke-width="1.4"/>
  <circle cx="30" cy="30" r="20" fill="none" stroke="#6B1F2A" stroke-width="0.8"/>
  <text x="30" y="30" dy="0.345em" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="600"
        letter-spacing="0.5" fill="#111111">SG</text>
  <!-- Wordmark -->
  <text x="72" y="26" dy="0.34em"
        font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="500"
        letter-spacing="3" fill="#111111">SHREE GALLARY</text>
  <!-- Hairline + micro tagline -->
  <line x1="73" y1="40" x2="287" y2="40" stroke="#6B1F2A" stroke-width="0.6" opacity="0.55"/>
  <text x="73" y="50" dy="0.34em"
        font-family="Georgia, 'Times New Roman', serif" font-size="7" font-weight="500"
        letter-spacing="2.4" fill="#6B6B6B">JEWELLERY · IMITATION · CLOTHING</text>
</svg>
